<style>
  :root{
    --bg:#0E0E10;
    --card:#17171A;
    --card-2:#1F1F23;
    --line:#2A2A2F;
    --ink:#EDEAE3;
    --muted:#86827A;
    --tan:#D4A857;
    --tan-deep:#A8803C;
    --green:#7BC47F;
    --rest:#5B7FB5;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 24px)}
  .wrap{max-width:560px;margin:0 auto;padding:0 18px}

  /* Header */
  header{padding:26px 0 16px;padding-top:calc(env(safe-area-inset-top) + 22px)}
  .brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .logo{font-family:'Anton','Arial Black',Impact,sans-serif;letter-spacing:.14em;font-size:15px;color:var(--muted)}
  .logo b{color:var(--tan)}
  .streak{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:12px;font-weight:700;color:var(--tan);background:var(--card);border:1px solid var(--line);padding:6px 11px;border-radius:999px;display:flex;align-items:center;gap:6px}
  .day-name{font-family:'Anton','Arial Black',Impact,sans-serif;font-size:clamp(46px,15vw,72px);line-height:.86;letter-spacing:.01em;text-transform:uppercase}
  .day-sub{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:12px;color:var(--muted);margin-top:10px;letter-spacing:.04em;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .tag{font-size:10px;font-weight:700;letter-spacing:.1em;padding:4px 8px;border-radius:5px;text-transform:uppercase}
  .tag.tan{background:rgba(212,168,87,.14);color:var(--tan)}
  .tag.off{background:rgba(91,127,181,.16);color:var(--rest)}
  .tag.look{background:rgba(123,196,127,.14);color:var(--green)}

  /* Big MISSION banner */
  @keyframes scanline{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

  /* Full-screen ALERT overlay */
  @keyframes flashBar{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes ovIn{from{opacity:0}to{opacity:1}}
  .overlay{position:fixed;inset:0;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:calc(env(safe-area-inset-top) + 30px) 26px calc(env(safe-area-inset-bottom) + 30px);background:radial-gradient(120% 100% at 50% 0%,#3a0808,#160202 70%,#0a0101);animation:ovIn .18s ease}
  .overlay.show{display:flex}
  .overlay::before{content:"";position:absolute;inset:0;border:3px solid #ff2b2b;animation:flashBar 1s steps(1) infinite;pointer-events:none}
  .ov-eyebrow{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:12px;font-weight:700;letter-spacing:.28em;color:#ff5a4d;margin-bottom:26px;display:flex;align-items:center;gap:9px}
  .ov-eyebrow .live{width:9px;height:9px;border-radius:50%;background:#ff2b2b;animation:flashBar 1s steps(1) infinite}
  .ov-text{font-family:'Anton','Arial Black',Impact,sans-serif;font-size:clamp(34px,9vw,56px);line-height:1.02;letter-spacing:.01em;color:#fff;text-transform:uppercase;text-shadow:0 0 30px rgba(255,40,40,.35);max-width:620px}
  .ov-name{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:11px;letter-spacing:.2em;color:#D4A857;margin-top:24px}
  .ov-cancel{margin-top:42px;font-family:'Anton','Arial Black',Impact,sans-serif;font-size:18px;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:#ff2b2b;border:none;border-radius:14px;padding:16px 42px;cursor:pointer;box-shadow:0 8px 30px rgba(255,40,40,.35)}
  .ov-cancel:active{transform:scale(.96)}
  .ov-sub{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:10px;color:#8a4a44;margin-top:16px;letter-spacing:.06em}

  /* Targets */
  .targets{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
  .targets-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .targets-head .th-title{font-family:'Anton','Arial Black',Impact,sans-serif;font-size:16px;letter-spacing:.06em;text-transform:uppercase}
  .deadline{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:10px;font-weight:700;color:#ff5a4d;background:rgba(255,40,40,.1);border:1px solid rgba(255,40,40,.35);padding:5px 9px;border-radius:8px;letter-spacing:.04em}
  .goal{padding:14px 0;border-top:1px solid var(--line);cursor:pointer}
  .goal:first-of-type{border-top:none;margin-top:8px}
  .goal-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px}
  .goal-label{font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:7px}
  .goal-label .ico{font-size:14px}
  .goal-nums{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:12px;color:var(--muted);white-space:nowrap}
  .goal-nums b{color:var(--tan);font-size:13px}
  .goal-bar{height:8px;border-radius:99px;background:var(--card-2);overflow:hidden}
  .goal-fill{height:100%;border-radius:99px;transition:width .4s ease}
  .goal-edit{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:9px;color:#4a4843;margin-top:6px;letter-spacing:.05em}

  /* Day pills */
  .pills{display:flex;gap:7px;overflow-x:auto;padding:14px 0 6px;scrollbar-width:none}
  .pills::-webkit-scrollbar{display:none}
  .pill{flex:0 0 auto;min-width:46px;text-align:center;padding:9px 0;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--muted);font-size:12px;font-weight:600;letter-spacing:.05em;cursor:pointer;transition:.15s}
  .pill .dot{display:block;width:5px;height:5px;border-radius:50%;margin:5px auto 0;background:transparent}
  .pill.done .dot{background:var(--green)}
  .pill.active{background:var(--tan);border-color:var(--tan);color:#1a1206}
  .pill.today:not(.active){border-color:var(--tan-deep);color:var(--tan)}

  /* Progress */
  .prog{margin:18px 0 8px}
  .prog-bar{height:7px;border-radius:99px;background:var(--card-2);overflow:hidden}
  .prog-fill{height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--tan-deep),var(--tan));transition:width .35s ease}
  .prog-meta{display:flex;justify-content:space-between;margin-top:9px;font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:11px;color:var(--muted)}
  .prog-meta b{color:var(--ink)}

  /* Tasks */
  .list{margin-top:14px;display:flex;flex-direction:column;gap:9px}
  .task{display:flex;align-items:flex-start;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px 15px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
  .task:active{transform:scale(.992)}
  .task .time{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:11px;font-weight:700;color:var(--tan);min-width:62px;padding-top:2px;letter-spacing:.02em}
  .task .body{flex:1;min-width:0}
  .task .t-title{font-size:15px;font-weight:600;line-height:1.3}
  .task .t-note{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.4}
  .check{flex:0 0 auto;width:24px;height:24px;border-radius:8px;border:2px solid var(--line);margin-top:1px;display:grid;place-items:center;transition:.15s}
  .check svg{width:13px;height:13px;opacity:0;transform:scale(.4);transition:.18s}
  .task.done{background:var(--card-2)}
  .task.done .check{background:var(--green);border-color:var(--green)}
  .task.done .check svg{opacity:1;transform:scale(1)}
  .task.done .t-title{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--tan-deep)}
  .task.done .time{color:var(--muted)}

  /* Gold anchor task — Remember God */
  .task.gold{background:linear-gradient(135deg,rgba(212,168,87,.16),rgba(168,128,60,.06));border-color:var(--tan);position:relative}
  .task.gold::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(180deg,#ffe6ad,var(--tan),var(--tan-deep))}
  .task.gold .time{color:var(--tan)}
  .task.gold .t-title{color:#ffe6ad}
  .task.gold .check{border-color:var(--tan)}
  .task.gold.done{background:linear-gradient(135deg,rgba(212,168,87,.1),rgba(168,128,60,.04))}
  .task.gold.done .check{background:var(--tan);border-color:var(--tan)}
  .task.gold.done .t-title{color:var(--tan-deep)}

  /* Workout card */
  .workout{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px}
  .workout.rest{opacity:.65}
  .wk-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
  .wk-titles .wk-title{font-family:'Anton','Arial Black',Impact,sans-serif;font-size:16px;letter-spacing:.04em;text-transform:uppercase;line-height:1.05}
  .wk-titles .wk-sub{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:.04em}
  .wk-count{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:11px;font-weight:700;color:var(--tan);white-space:nowrap}
  .ex{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--line);cursor:pointer}
  .ex:first-of-type{border-top:none;margin-top:6px}
  .ex-body{flex:1;min-width:0}
  .ex-n{font-size:14px;font-weight:600;line-height:1.25;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .ex-s{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:11.5px;color:var(--tan);margin-top:3px}
  .wbadge{font-size:8.5px;font-weight:700;letter-spacing:.08em;color:#1a1206;background:var(--tan);padding:2px 6px;border-radius:4px}
  .ex-check{flex:0 0 auto;width:23px;height:23px;border-radius:7px;border:2px solid var(--line);display:grid;place-items:center;transition:.15s}
  .ex-check svg{width:12px;height:12px;opacity:0;transform:scale(.4);transition:.18s}
  .ex.done .ex-check{background:var(--tan);border-color:var(--tan)}
  .ex.done .ex-check svg{opacity:1;transform:scale(1)}
  .ex.done .ex-n{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--tan-deep)}
  .wk-rest{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:12px;color:var(--muted);padding:6px 0 2px}

  .empty{text-align:center;color:var(--muted);padding:48px 20px;font-size:14px;line-height:1.6}
  .empty b{color:var(--rest);font-family:'Anton','Arial Black',Impact,sans-serif;font-size:20px;letter-spacing:.04em;display:block;margin-bottom:8px}

  footer{margin-top:26px;text-align:center;font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:10.5px;color:#46443f;letter-spacing:.08em;line-height:1.7}
</style>
</head>

Object.values(SCHEDULE).forEach(day=>{

// ---- WORKOUT split (wide frame · shoulders 4x/wk · no leg day) ----

let lastAlert = -1;
function pickAlert(){
  let i;
  do { i = Math.floor(Math.random()*ALERTS.length); } while(i===lastAlert && ALERTS.length>1);
  lastAlert = i; return ALERTS[i];
}
function showOverlay(){ $("#ovText").textContent = pickAlert(); $("#overlay").classList.add("show"); }
function scheduleOverlay(){ clearTimeout(window._ovT); window._ovT = setTimeout(showOverlay, 30000); }
function hideOverlay(){ $("#overlay").classList.remove("show"); scheduleOverlay(); }
$("#ovCancel").onclick = hideOverlay;
scheduleOverlay(); // first alert 30s after opening, then 30s after each dismiss

// ---- TARGETS ----
const DEADLINE = new Date(new Date().getFullYear(), 8, 30, 23, 59); // Sep 30 (month index 8)
const GOALS = [
  {id:"weight", ico:"🏋️", label:"Bodyweight", target:85, unit:"kg", color:"linear-gradient(90deg,#A8803C,#D4A857)", def:75, fmt:v=>v+"kg"},
  {id:"money",  ico:"💰", label:"500K in bank (InstaPay)", target:500000, unit:"EGP", color:"linear-gradient(90deg,#1f7a3f,#34c759)", def:0, fmt:v=>Number(v).toLocaleString()+" LE", deadline:true},
  {id:"tiktok", ico:"🎵", label:"TikTok followers", target:20000, unit:"", color:"linear-gradient(90deg,#8a1f5a,#ff2b6d)", def:0, fmt:v=>Number(v).toLocaleString()},
  {id:"insta",  ico:"📸", label:"Instagram followers", target:5000, unit:"", color:"linear-gradient(90deg,#7a3fb0,#c13584)", def:0, fmt:v=>Number(v).toLocaleString()},
];
function goalVal(id, def){ const v = localStorage.getItem("goal_"+id); return v===null?def:Number(v); }
function setGoalVal(id, v){ localStorage.setItem("goal_"+id, v); }

function renderTargets(){
  const days = Math.ceil((DEADLINE - new Date())/86400000);
  $("#deadline").textContent = days>0 ? `⏳ ${days} DAYS LEFT · SEP 30` : "⛔ DEADLINE PASSED";
  $("#goals").innerHTML = GOALS.map(g=>{
    const cur = goalVal(g.id, g.def);
    const pct = Math.max(0, Math.min(100, Math.round(cur/g.target*100)));
    return `<div class="goal" data-id="${g.id}">
      <div class="goal-top">
        <div class="goal-label"><span class="ico">${g.ico}</span>${g.label}${g.deadline?` · <span style="color:#ff5a4d">${days>0?days+'d':'late'}</span>`:""}</div>
        <div class="goal-nums"><b>${g.fmt(cur)}</b> / ${g.fmt(g.target)}</div>
      </div>
      <div class="goal-bar"><div class="goal-fill" style="width:${pct}%;background:${g.color}"></div></div>
      <div class="goal-edit">${pct}% — TAP TO UPDATE</div>
    </div>`;
  }).join("");
  document.querySelectorAll(".goal").forEach(el=>{
    el.onclick=()=>{
      const g = GOALS.find(x=>x.id===el.dataset.id);
      const cur = goalVal(g.id, g.def);
      const input = prompt(`Update "${g.label}" — current value (target ${g.target}${g.unit}):`, cur);
      if(input!==null && input.trim()!==""){
        const n = Number(input.replace(/[^0-9.]/g,""));
        if(!isNaN(n)){ setGoalVal(g.id, n); renderTargets(); }
      }
    };
  });
}
renderTargets();
setInterval(renderTargets, 3600000);

const pad = n => String(n).padStart(2,"0");
const fmtKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

// week start = most recent Saturday at midnight
function weekStart(){
  const t = new Date(); t.setHours(0,0,0,0);
  const since = (t.getDay() - 6 + 7) % 7; // Sat->0 ... Fri->6
  t.setDate(t.getDate() - since);
  return t;
}
function dateForIndex(i){ const d = weekStart(); d.setDate(d.getDate()+i); return d; }

const todayCode = (()=>{ return new Date().getDay(); })();
let selected = ORDER.indexOf(todayCode);
if(selected < 0) selected = 0;

function load(key){ try{ return JSON.parse(localStorage.getItem("rt_"+key)||"[]"); }catch(e){ return []; } }
function save(key, arr){ try{ localStorage.setItem("rt_"+key, JSON.stringify(arr)); }catch(e){} }

function isComplete(dateKey, code){
  const total = SCHEDULE[code].tasks.length;
  return load(dateKey).length >= total && total>0;
}

function computeStreak(){
  let streak = 0;
  const d = new Date(); d.setHours(0,0,0,0);
  // if today not complete, start counting from yesterday
  if(!isComplete(fmtKey(d), d.getDay())) d.setDate(d.getDate()-1);
  for(let i=0;i<400;i++){
    if(isComplete(fmtKey(d), d.getDay())){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function render(){
  const code = ORDER[selected];
  const day = SCHEDULE[code];
  const date = dateForIndex(selected);
  const key = fmtKey(date);
  const done = load(key);

  $("#dayName").textContent = day.label;
  const ds = date.toLocaleDateString(undefined,{month:"short",day:"numeric"});
  let tagHtml = `<span>${ds}</span><span>·</span><span>${day.type}</span>`;
  day.tags.forEach(tg=>{ const [cls,lab]=TAGLABEL[tg]; tagHtml += ` <span class="tag ${cls}">${lab}</span>`; });
  $("#daySub").innerHTML = tagHtml;

  // pills
  $("#pills").innerHTML = ORDER.map((c,i)=>{
    const dk = fmtKey(dateForIndex(i));
    const cls = ["pill"];
    if(i===selected) cls.push("active");
    if(c===todayCode) cls.push("today");
    if(isComplete(dk,c)) cls.push("done");
    return `<div class="${cls.join(' ')}" data-i="${i}">${SHORT[c]}<span class="dot"></span></div>`;
  }).join("");
  document.querySelectorAll(".pill").forEach(p=>p.onclick=()=>{ selected=+p.dataset.i; render(); });

  // tasks
  $("#list").innerHTML = day.tasks.map((task,idx)=>{
    const isDone = done.includes(idx);
    return `<div class="task ${task.gold?'gold':''} ${isDone?'done':''}" data-idx="${idx}">
      <div class="time">${task.t}</div>
      <div class="body">
        <div class="t-title">${task.title}</div>
        ${task.note?`<div class="t-note">${task.note}</div>`:""}
      </div>
      <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="#0E0E10" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
    </div>`;
  }).join("");
  document.querySelectorAll(".task").forEach(el=>{
    el.onclick=()=>{
      const idx=+el.dataset.idx;
      let arr=load(key);
      if(arr.includes(idx)) arr=arr.filter(x=>x!==idx); else arr.push(idx);
      save(key,arr); render();
    };
  });

  // workout
  const wk = WORKOUTS[code];
  const wkKey = "wk_"+key;
  let wkDone = []; try{ wkDone = JSON.parse(localStorage.getItem(wkKey)||"[]"); }catch(e){}
  const wkEl = $("#workout");
  if(!wk.ex.length){
    wkEl.className = "workout rest";
    wkEl.innerHTML = `<div class="wk-head"><div class="wk-titles"><div class="wk-title">${wk.title}</div><div class="wk-sub">${wk.sub}</div></div></div><div class="wk-rest">No training today. Recover so you grow.</div>`;
  } else {
    wkEl.className = "workout";
    wkEl.innerHTML = `<div class="wk-head">
        <div class="wk-titles"><div class="wk-title">💪 ${wk.title}</div><div class="wk-sub">${wk.sub}</div></div>
        <div class="wk-count">${wkDone.length}/${wk.ex.length}</div>
      </div>` + wk.ex.map((e,i)=>{
        const d = wkDone.includes(i);
        return `<div class="ex ${d?'done':''}" data-ex="${i}">
          <div class="ex-body">
            <div class="ex-n">${e.n}${e.w?'<span class="wbadge">WIDTH</span>':''}</div>
            <div class="ex-s">${e.s}</div>
          </div>
          <div class="ex-check"><svg viewBox="0 0 24 24" fill="none" stroke="#1a1206" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        </div>`;
      }).join("");
    wkEl.querySelectorAll(".ex").forEach(el=>{
      el.onclick=()=>{
        const i=+el.dataset.ex;
        let arr=[]; try{ arr=JSON.parse(localStorage.getItem(wkKey)||"[]"); }catch(e){}
        if(arr.includes(i)) arr=arr.filter(x=>x!==i); else arr.push(i);
        localStorage.setItem(wkKey, JSON.stringify(arr)); render();
      };
    });
  }

  // progress
  const total = day.tasks.length;
  const d = done.length;
  const pct = total? Math.round(d/total*100):0;
  $("#progFill").style.width = pct+"%";
  $("#doneCount").textContent = d;
  $("#totalCount").textContent = total;
  $("#progPct").textContent = pct+"%";
  $("#streak").textContent = computeStreak();
}

render();
</script>
</body>
</html>
